<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝙺𝙸𝙽𝙶 𝙼𝙾𝙳 - تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Tajawal', sans-serif; background: #050a18; color: #eef2ff; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* ===== خلفية متحركة ===== */
        .bg-aurora { position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 30%, rgba(26,74,138,0.15), transparent 65%), radial-gradient(ellipse at 85% 70%, rgba(74,154,255,0.10), transparent 60%), radial-gradient(ellipse at 60% 90%, rgba(26,74,138,0.08), transparent 55%); z-index: -1; animation: auroraShift 12s ease-in-out infinite alternate; }
        @keyframes auroraShift { from { opacity:0.8; transform: scale(1); } to { opacity:1; filter: brightness(1.1); transform: scale(1.05); } }
        
        /* ===== جزيئات متحركة ===== */
        .particles { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
        .particle { position: absolute; width: 2px; height: 2px; background: rgba(74,154,255,0.2); border-radius: 50%; animation: float linear infinite; }
        @keyframes float { 0% { transform: translateY(100vh) translateX(0); opacity:0; } 10% { opacity:1; } 90% { opacity:0.5; } 100% { transform: translateY(-10vh) translateX(40px); opacity:0; } }
        
        /* ===== خطوط متحركة ===== */
        .floating-lines { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .floating-lines span { position: absolute; width: 1px; height: 60px; background: linear-gradient(to bottom, transparent, rgba(74,154,255,0.06), transparent); animation: lineFloat 10s infinite linear; }
        .floating-lines span:nth-child(1) { left: 10%; animation-delay: 0s; }
        .floating-lines span:nth-child(2) { left: 30%; animation-delay: 2s; height: 80px; }
        .floating-lines span:nth-child(3) { left: 50%; animation-delay: 4s; }
        .floating-lines span:nth-child(4) { left: 70%; animation-delay: 6s; height: 90px; }
        .floating-lines span:nth-child(5) { left: 90%; animation-delay: 8s; }
        @keyframes lineFloat { 0% { transform: translateY(-100px) rotate(0deg); opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { transform: translateY(100vh) rotate(360deg); opacity:0; } }
        
        /* ===== نجمة متحركة ===== */
        .floating-star { position: fixed; font-size: 20px; color: rgba(74,154,255,0.04); animation: starFloat 15s infinite linear; pointer-events: none; z-index: -1; }
        .floating-star:nth-child(1) { left: 5%; animation-delay: 0s; font-size: 30px; }
        .floating-star:nth-child(2) { left: 95%; animation-delay: 5s; font-size: 25px; }
        .floating-star:nth-child(3) { left: 50%; animation-delay: 10s; font-size: 35px; }
        @keyframes starFloat { 0% { transform: translateY(100vh) rotate(0deg); opacity:0; } 10% { opacity:0.3; } 90% { opacity:0.3; } 100% { transform: translateY(-10vh) rotate(720deg); opacity:0; } }
        
        /* ===== صورة من تحت (شعار متحرك) ===== */
        .footer-brand {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 50;
            opacity: 0.4;
            animation: footerPulse 4s ease-in-out infinite;
            pointer-events: none;
        }
        .footer-brand i {
            font-size: 24px;
            color: #4a9aff;
            margin-bottom: 4px;
            display: block;
            animation: iconFloat 3s ease-in-out infinite;
        }
        .footer-brand span {
            font-size: 11px;
            color: #4b6b8a;
            letter-spacing: 2px;
        }
        @keyframes footerPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        @keyframes iconFloat { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-8px) rotate(10deg); } }
        
        /* ===== حاوية ===== */
        .login-wrap { width: 100%; max-width: 440px; padding: 20px; animation: fadeInUp 0.8s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes fadeInUp { from { opacity:0; transform:translateY(40px) scale(0.95); } to { opacity:1; transform:translateY(0) scale(1); } }
        
        /* ===== بطاقة ===== */
        .login-card { background: rgba(10,22,40,0.92); backdrop-filter: blur(24px); border: 1px solid rgba(26,74,138,0.4); border-radius: 32px; padding: 40px 36px; box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(26,74,138,0.1) inset; transition: all 0.4s ease; }
        .login-card:hover { border-color: rgba(26,74,138,0.6); box-shadow: 0 30px 80px rgba(26,74,138,0.08); }
        
        /* ===== الشعار ===== */
        .brand { text-align: center; margin-bottom: 32px; }
        .brand-icon { 
            width: 72px; 
            height: 72px; 
            background: linear-gradient(145deg, #0a1628, #0d1a2e); 
            border: 1.5px solid rgba(26,74,138,0.5); 
            border-radius: 22px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0 auto 16px; 
            box-shadow: 0 0 24px rgba(26,74,138,0.2), 0 0 60px rgba(26,74,138,0.08); 
            animation: pulseGlow 3s ease-in-out infinite; 
            overflow: hidden;
        }
        .brand-icon img {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
        }
        @keyframes pulseGlow { 0%, 100% { box-shadow: 0 0 24px rgba(26,74,138,0.2); transform: scale(1); } 50% { box-shadow: 0 0 50px rgba(26,74,138,0.35); transform: scale(1.05); } }
        .brand-name { font-size: 1.5rem; font-weight: 800; letter-spacing: 3px; background: linear-gradient(135deg, #4a9aff, #1a6ad8); -webkit-background-clip: text; background-clip: text; color: transparent; animation: shimmer 4s ease-in-out infinite; background-size: 200% 200%; }
        @keyframes shimmer { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .brand-sub { font-size: 0.8rem; color: #6b8ab0; margin-top: 6px; animation: fadeInOut 4s ease-in-out infinite; }
        @keyframes fadeInOut { 0%, 100% { opacity:0.7; } 50% { opacity:1; } }
        
        /* ===== أزرار التبديل ===== */
        .tabs { display: flex; gap: 8px; margin-bottom: 28px; background: rgba(10,22,40,0.6); border-radius: 40px; padding: 4px; border: 1px solid rgba(26,74,138,0.2); }
        .tab-btn { flex: 1; padding: 10px; border-radius: 36px; border: none; background: none; color: #6b8ab0; font-family: 'Tajawal', sans-serif; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1); position: relative; overflow: hidden; }
        .tab-btn::before { content: ''; position: absolute; inset: 0; border-radius: 36px; background: linear-gradient(135deg, #1a4a8a, #0a2a5a); opacity: 0; transition: all 0.4s ease; transform: scale(0.8); }
        .tab-btn.active { color: white; box-shadow: 0 4px 14px rgba(26,74,138,0.4); }
        .tab-btn.active::before { opacity: 1; transform: scale(1); }
        .tab-btn:not(.active):hover { color: #4a9aff; transform: translateY(-2px); }
        .tab-btn span { position: relative; z-index: 1; }
        
        /* ===== حقول الإدخال ===== */
        .form-group { margin-bottom: 18px; animation: slideInput 0.5s ease both; }
        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        @keyframes slideInput { from { opacity:0; transform: translateX(-20px); } to { opacity:1; transform: translateX(0); } }
        .form-label { display: block; font-size: 0.8rem; color: #6b8ab0; margin-bottom: 8px; font-weight: 600; transition: all 0.3s ease; }
        .form-label i { color: #4a9aff; margin-left: 6px; }
        .form-input { width: 100%; padding: 13px 18px; background: rgba(10,22,40,0.6); border: 1px solid rgba(26,74,138,0.3); border-radius: 14px; color: #eef2ff; font-family: 'Tajawal', sans-serif; font-size: 0.95rem; outline: none; transition: all 0.4s ease; }
        .form-input:focus { border-color: #4a9aff; background: rgba(26,74,138,0.1); box-shadow: 0 0 0 3px rgba(26,74,138,0.15), 0 0 30px rgba(26,74,138,0.05); transform: scale(1.01); }
        .form-input::placeholder { color: #4b6b8a; transition: all 0.3s ease; }
        .form-input:focus::placeholder { opacity: 0.3; transform: translateX(10px); }
        .input-icon-wrap { position: relative; }
        .input-icon-wrap .form-input { padding-right: 44px; }
        .input-icon { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: #4b6b8a; font-size: 0.9rem; transition: all 0.3s ease; }
        .form-input:focus + .input-icon { color: #4a9aff; }
        
        /* ===== زر الدخول ===== */
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #1a4a8a, #0a2a5a); border: none; border-radius: 14px; color: white; font-family: 'Tajawal', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1); box-shadow: 0 6px 20px rgba(26,74,138,0.4); display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 8px; position: relative; overflow: hidden; }
        .submit-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); transition: 0.6s ease; }
        .submit-btn:hover::before { left: 100%; }
        .submit-btn:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 12px 35px rgba(26,74,138,0.55); }
        .submit-btn:active { transform: translateY(0) scale(0.98); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .submit-btn i { transition: all 0.3s ease; }
        .submit-btn:hover i { transform: translateX(-5px); }
        
        /* ===== تنبيهات ===== */
        .alert { border-radius: 12px; padding: 12px 16px; font-size: 0.82rem; margin-bottom: 16px; display: none; align-items: center; gap: 10px; animation: alertIn 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes alertIn { from { opacity:0; transform: translateY(-10px) scale(0.95); } to { opacity:1; transform: translateY(0) scale(1); } }
        .alert.error { background: rgba(255,61,90,0.1); border: 1px solid rgba(255,61,90,0.3); color: #ff7a94; }
        .alert.success { background: rgba(0,255,136,0.08); border: 1px solid rgba(0,255,136,0.3); color: #00ff88; }
        .alert.show { display: flex; }
        
        /* ===== فواصل ===== */
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #4b6b8a; font-size: 0.75rem; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background: rgba(26,74,138,0.2); }
        
        /* ===== زر تيليجرام ===== */
        .tg-btn { width: 100%; padding: 12px; background: rgba(26,74,138,0.1); border: 1px solid rgba(26,74,138,0.25); border-radius: 14px; color: #4a9aff; font-family: 'Tajawal', sans-serif; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.4s ease; display: flex; align-items: center; justify-content: center; gap: 10px; text-decoration: none; }
        .tg-btn:hover { background: rgba(26,74,138,0.2); border-color: rgba(26,74,138,0.4); transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 25px rgba(26,74,138,0.1); }
        
        /* ===== تحميل ===== */
        .spinner-sm { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* ===== تذييل ===== */
        .footer-note { text-align: center; margin-top: 24px; font-size: 0.75rem; color: #4b6b8a; animation: fadeInOut 5s ease-in-out infinite; }
        .footer-note a { color: #4a9aff; text-decoration: none; font-weight: 600; transition: all 0.3s ease; }
        .footer-note a:hover { color: #6ab0ff; text-decoration: underline; }
        
        /* ===== معلومات ===== */
        .info-box { background: rgba(26,74,138,0.06); border: 1px solid rgba(26,74,138,0.15); border-radius: 14px; padding: 12px 16px; margin-bottom: 18px; font-size: 0.75rem; color: #6b8ab0; text-align: center; animation: pulseBox 3s ease-in-out infinite; }
        @keyframes pulseBox { 0%, 100% { border-color: rgba(26,74,138,0.15); } 50% { border-color: rgba(26,74,138,0.3); } }
        .info-box i { color: #4a9aff; margin-left: 6px; }
        
        /* ===== قائمة المميزات ===== */
        .features-list { background: rgba(26,74,138,0.06); border-radius: 16px; padding: 16px; margin-bottom: 20px; text-align: center; animation: fadeInUp 0.6s ease; }
        .features-list h4 { color: #4a9aff; margin-bottom: 12px; font-size: 0.85rem; }
        .features-list h4 i { animation: iconFloat 3s ease-in-out infinite; }
        @keyframes iconFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        .features-list p { font-size: 0.7rem; color: #6b8ab0; line-height: 1.6; }
        
        /* ===== استجابة ===== */
        @media (max-width: 480px) { 
            .login-card { padding: 24px 18px; } 
            .brand-name { font-size: 1.2rem; } 
            .footer-brand { display: none; } 
        }
    </style>
</head>
<body>

<!-- ===== خلفية متحركة ===== -->
<div class="bg-aurora"></div>
<div class="floating-lines"><span></span><span></span><span></span><span></span><span></span></div>
<div class="particles" id="particles"></div>
<div class="floating-star">✦</div>
<div class="floating-star">✦</div>
<div class="floating-star">✦</div>

<!-- ===== صورة من تحت ===== -->
<div class="footer-brand">
    <i class="fas fa-cloud"></i>
    <span>𝙺𝙸𝙽𝙶 𝙼𝙾𝙳</span>
</div>

<div class="login-wrap">
    <div class="login-card">
        <!-- ===== الشعار مع الصورة ===== -->
        <div class="brand">
            <div class="brand-icon">
                <img src="https://i.postimg.cc/YCGcSH9D/IMG-20260613-201939-738.jpg" style="width:55px; height:55px; border-radius:12px; object-fit:cover;">
            </div>
            <div class="brand-name">𝙺𝙸𝙽𝙶 𝙼𝙾𝙳</div>
            <div class="brand-sub">CLOUD HOSTING PLATFORM</div>
        </div>

        <!-- ===== أزرار التبديل (تسجيل دخول هو النشط) ===== -->
        <div class="tabs">
            <button class="tab-btn active" id="loginTab" onclick="switchTab('login')">
                <span><i class="fas fa-sign-in-alt"></i> تسجيل دخول</span>
            </button>
            <button class="tab-btn" id="registerTab" onclick="switchTab('register')">
                <span><i class="fas fa-user-plus"></i> إنشاء حساب</span>
            </button>
        </div>

        <!-- ===== تنبيه ===== -->
        <div class="alert" id="alert">
            <i class="fas fa-exclamation-circle"></i>
            <span id="alertMsg"></span>
        </div>

        <!-- ===== نموذج تسجيل الدخول (ظاهر) ===== -->
        <div id="loginForm">
            <div class="info-box"><i class="fas fa-info-circle"></i> قم بتسجيل الدخول للوصول إلى لوحة التحكم</div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-user"></i> اسم المستخدم</label>
                <div class="input-icon-wrap">
                    <input type="text" class="form-input" id="loginUsername" placeholder="اسم المستخدم" autocomplete="username">
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> كلمة المرور</label>
                <div class="input-icon-wrap">
                    <input type="password" class="form-input" id="loginPassword" placeholder="كلمة المرور" autocomplete="current-password">
                    <i class="fas fa-lock input-icon"></i>
                </div>
            </div>
            <button class="submit-btn" id="loginBtn" onclick="doLogin()">
                <span id="loginText"><i class="fas fa-sign-in-alt"></i> دخول</span>
                <div class="spinner-sm" id="loginSpinner"></div>
            </button>
        </div>

        <!-- ===== نموذج إنشاء حساب (مخفي) ===== -->
        <div id="registerForm" style="display:none;">
            <div class="features-list">
                <h4><i class="fas fa-gift"></i> مميزات الخطة المجانية</h4>
                <p>✨ 500 GB مساحة تخزين | ✨ سيرفرين كحد أقصى | ✨ 256 MB رام | ✨ دعم Python و Node.js</p>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-user"></i> اسم المستخدم</label>
                <div class="input-icon-wrap">
                    <input type="text" class="form-input" id="regUsername" placeholder="ادخل اسم المستخدم" autocomplete="off">
                    <i class="fas fa-user input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-lock"></i> كلمة المرور</label>
                <div class="input-icon-wrap">
                    <input type="password" class="form-input" id="regPassword" placeholder="ادخل كلمة المرور" autocomplete="new-password">
                    <i class="fas fa-lock input-icon"></i>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fas fa-check-circle"></i> تأكيد كلمة المرور</label>
                <div class="input-icon-wrap">
                    <input type="password" class="form-input" id="regConfirm" placeholder="ادخل كلمة المرور" autocomplete="new-password">
                    <i class="fas fa-check-circle input-icon"></i>
                </div>
            </div>
            <button class="submit-btn" id="registerBtn" onclick="doRegister()">
                <span id="registerText"><i class="fas fa-user-plus"></i> إنشاء حساب</span>
                <div class="spinner-sm" id="registerSpinner"></div>
            </button>

            <div class="divider">أو تواصل معنا</div>
            <a href="https://t.me/K_I_G_M" target="_blank" class="tg-btn">
                <i class="fab fa-telegram-plane" style="font-size:1.2rem;"></i>
                تواصل مع الدعم @K_I_G_M
            </a>
        </div>

        <!-- ===== تذييل ===== -->
        <div class="footer-note">
            🛠 بواسطة <a href="https://t.me/K_I_G_M" target="_blank">@K_I_G_M</a> &nbsp;|&nbsp; 𝙺𝙸𝙽𝙶 𝙼𝙾𝙳 © 2025
        </div>
    </div>
</div>

<script>
    // ===== جزيئات متحركة =====
    const container = document.getElementById('particles');
    for(let i = 0; i < 35; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.animationDuration = (6 + Math.random() * 14) + 's';
        p.style.animationDelay = (Math.random() * 12) + 's';
        p.style.width = p.style.height = (1 + Math.random() * 3) + 'px';
        p.style.opacity = 0.2 + Math.random() * 0.6;
        container.appendChild(p);
    }

    // ===== تبديل التبويبات =====
    function switchTab(tab) {
        clearAlert();
        if(tab === 'login') {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('registerTab').classList.remove('active');
        } else {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            document.getElementById('loginTab').classList.remove('active');
            document.getElementById('registerTab').classList.add('active');
        }
    }

    // ===== تنبيهات =====
    function showAlert(msg, type='error') {
        const el = document.getElementById('alert');
        const icon = el.querySelector('i');
        el.className = `alert ${type} show`;
        icon.className = `fas ${type==='success' ? 'fa-check-circle' : 'fa-exclamation-circle'}`;
        document.getElementById('alertMsg').textContent = msg;
    }
    function clearAlert() { document.getElementById('alert').className = 'alert'; }

    // ===== حالة التحميل =====
    function setLoading(btn, spinner, text, loading) {
        document.getElementById(btn).disabled = loading;
        document.getElementById(spinner).style.display = loading ? 'block' : 'none';
        document.getElementById(text).style.display = loading ? 'none' : 'flex';
    }

    // ===== تسجيل الدخول =====
    async function doLogin() {
        const username = document.getElementById('loginUsername').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        if(!username || !password) { showAlert('الرجاء إدخال اسم المستخدم وكلمة المرور'); return; }
        clearAlert();
        setLoading('loginBtn', 'loginSpinner', 'loginText', true);
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if(data.success) {
                showAlert('✅ مرحباً! جاري التحويل...', 'success');
                setTimeout(() => window.location.href = data.redirect || '/', 800);
            } else {
                showAlert(data.message || 'بيانات غير صحيحة');
                setLoading('loginBtn', 'loginSpinner', 'loginText', false);
            }
        } catch(e) {
            showAlert('خطأ في الاتصال بالخادم');
            setLoading('loginBtn', 'loginSpinner', 'loginText', false);
        }
    }

    // ===== إنشاء حساب =====
    async function doRegister() {
        const username = document.getElementById('regUsername').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const confirm = document.getElementById('regConfirm').value.trim();
        
        if(!username || !password || !confirm) { 
            showAlert('⚠️ الرجاء إدخال جميع البيانات'); 
            return; 
        }
        if(username.length < 3) { 
            showAlert('⚠️ اسم المستخدم 3 أحرف على الأقل'); 
            return; 
        }
        if(password.length < 4) { 
            showAlert('⚠️ كلمة المرور 4 أحرف على الأقل'); 
            return; 
        }
        if(password !== confirm) { 
            showAlert('⚠️ كلمة المرور غير متطابقة'); 
            return; 
        }
        
        clearAlert();
        setLoading('registerBtn', 'registerSpinner', 'registerText', true);
        try {
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            const data = await res.json();
            if(data.success) {
                showAlert('✅ تم إرسال طلبك! سيتم مراجعة من قبل المسؤول وسنعمل بالنتيجة.', 'success');
                document.getElementById('regUsername').value = '';
                document.getElementById('regPassword').value = '';
                document.getElementById('regConfirm').value = '';
                setTimeout(() => switchTab('login'), 3000);
            } else {
                showAlert('❌ ' + (data.message || 'فشل إنشاء الحساب'));
            }
        } catch(e) {
            showAlert('❌ خطأ في الاتصال بالخادم');
        }
        setLoading('registerBtn', 'registerSpinner', 'registerText', false);
    }

    // ===== دعم Enter =====
    document.addEventListener('keydown', e => {
        if(e.key === 'Enter') {
            const loginVisible = document.getElementById('loginForm').style.display !== 'none';
            if(loginVisible) doLogin();
            else doRegister();
        }
    });

    // ===== التحقق من المستخدم الحالي =====
    fetch('/api/current_user').then(r => r.json()).then(d => {
        if(d.success) window.location.href = d.is_admin ? '/admin' : '/dashboard';
    }).catch(() => {});
</script>
</body>
</html>
